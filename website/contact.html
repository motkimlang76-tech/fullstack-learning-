<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Kitty Studio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="contact-page">
    <header class="site-header">
      <a class="logo" href="index.html">Kitty Studio</a>

      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="service.html">Services</a>
        <a href="project.html">Projects</a>
        <a href="pricing.html">Pricing</a>
        <a class="active" href="contact.html">Contact</a>
      </nav>

      <div class="header-actions">
        <a class="btn ghost small" href="project.html">View Work</a>
        <a class="btn primary small" href="contact.html">Start Project</a>
      </div>
    </header>

    <main>
      <section class="hero contact-hero">
        <div class="hero-content">
          <h1>Let's work together</h1>
        </div>
      </section>

      <section class="section light">
        <div class="container contact-layout">
          <div class="section-heading left">
            <p class="eyebrow">Get in Touch</p>
            <h2>Get in Touch</h2>
            <p>Practice building forms with proper labels.</p>
          </div>

          <form class="contact-form" action="#" method="post">
            <label for="name">Name</label>

            <input id="name" name="name" type="text" autocomplete="username" />

            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" />

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6"></textarea>

            <button class="btn primary" type="submit">Send Message</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Kitty Studio</p>
      <p>Modern websites crafted with creativity and clean code.</p>
      <p>Copyright 2026 Kitty Studio</p>
    </footer>
  </body>
</html>
